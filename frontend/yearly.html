<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Dhan₹ekha – Yearly Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#22c55e">

  <link rel="shortcut icon" href="assets/icons/dashboard.png" type="image/png">
  <link rel="stylesheet" href="css/glass.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    .year-navigation {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      padding: 15px;
      position: sticky;
      top: 10px;
      z-index: 10;
    }

    .nav-arrow {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-arrow:active {
      transform: scale(0.95);
    }

    #currentYearDisplay {
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
    }

    #yearInput {
      background: transparent;
      border: none;
      border-bottom: 2px solid white;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      width: 80px;
      text-align: center;
      outline: none;
      display: none;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    @media (min-width: 768px) {
      .chart-grid {
        grid-template-columns: 2fr 1fr;
      }
    }

    @media (max-width: 768px) {
      .btn-text {
        display: none;
      }

      #downloadYearlyBtn {
        padding: 8px !important;
      }
    }

    @media (max-width: 768px) {

      /* Force show 4th column (Savings) for monthly breakdown table */
      .monthly-breakdown th:nth-child(4),
      .monthly-breakdown td:nth-child(4) {
        display: table-cell !important;
      }
    }
  </style>
</head>

<body>

  <!-- Page Loader -->
  <div id="page-loader">
    <div class="loader"></div>
    <p class="loader-text"></p>
  </div>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('page-loader');
      const text = loader.querySelector('.loader-text');
      if (text) text.innerText = "Compiling yearly reports...";
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }, 7000);
    });
  </script>

  <!-- Auth Guard -->
  <script src="js/authGuard.js"></script>

  <!-- Navbar -->
  <nav class="navbar glass-card">
    <div class="logo" onclick="location.href='dashboard'" style="cursor: pointer;">
      <img src="assets/logo1.png" alt="Dhan₹ekha Logo" loading="lazy" />
      <span>Dhan₹ekha</span>
    </div>

    <div class="nav-actions">
      <button onclick="location.href='monthly'" class="nav-btn-profile">
        <span class="desktop-text">📅 Monthly</span>
        <span class="mobile-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg></span>
      </button>
      <button onclick="location.href='dashboard'" class="nav-btn" title="Dashboard">
        <span class="desktop-text">Dashboard</span>
        <span class="mobile-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg></span>
      </button>
      <button onclick="location.href='profile'" class="nav-btn-profile" title="Your Profile" id="navbarProfileBtn">
        <span class="desktop-text">👤 Profile</span>
        <span class="mobile-icon" id="navbarProfileIcon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </span>
      </button>
    </div>
  </nav>

  <main class="container">

    <!-- Year Navigation -->
    <div class="year-navigation glass-card">
      <button id="prevYearBtn" class="nav-arrow">&lt;</button>
      <abbr title="Click to change year">
        <span id="currentYearDisplay"></span>
      </abbr>
      <input type="number" id="yearInput" />
      <button id="nextYearBtn" class="nav-arrow">&gt;</button>
    </div>

    <!-- Summary Cards -->
    <section class="summary">
      <div class="summary-card glass-card">
        <div class="liquid-bg liquid-blue" style="height: 100%; opacity: 0.1;"></div>
        <div class="card-content">
          <h4>Yearly Income</h4>
          <p id="yearlyIncome">₹0</p>
        </div>
      </div>
      <div class="summary-card glass-card">
        <div class="liquid-bg liquid-red" style="height: 100%; opacity: 0.1;"></div>
        <div class="card-content">
          <h4>Yearly Expense</h4>
          <p id="yearlyExpense">₹0</p>
        </div>
      </div>
      <div class="summary-card glass-card">
        <div class="liquid-bg liquid-green" style="height: 100%; opacity: 0.1;"></div>
        <div class="card-content">
          <h4>Remaining Savings</h4>
          <p id="yearlyBalance">₹0</p>
          <div id="savingsProgressContainer"
            style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden;">
            <div id="savingsProgressBar"
              style="width: 0%; height: 100%; background: #22c55e; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);">
            </div>
          </div>
          <p id="savingsRatioText" style="font-size: 0.75rem; margin-top: 5px; opacity: 0.7;">Savings Ratio: 0%</p>
        </div>
      </div>
    </section>

    <!-- Monthly Wise Summary Table -->
    <section id="monthlyBreakdownSection" class="glass-card" style="margin-top: 20px; padding: 20px;">
      <h3 style="margin-bottom: 15px;">Monthly Breakdown</h3>
      <div class="table-responsive" style="overflow-x: auto;">
        <table class="expense-table monthly-breakdown" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Month</th>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Income</th>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Expense</th>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Savings</th>
            </tr>
          </thead>
          <tbody id="monthlyTableBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Yearly Insights (New) -->
    <section class="chart-grid"
      style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
      <div class="summary-card glass-card"
        style="text-align: left; padding: 15px; display: flex; align-items: center; gap: 15px; flex: 1;">
        <div style="font-size: 2rem; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 12px;">🔥</div>
        <div>
          <h4 style="margin: 0; font-size: 0.85rem; opacity: 0.7;">Highest Spending Month</h4>
          <p id="peakMonth" style="margin: 5px 0 0 0; font-size: 1.2rem; font-weight: 700;">-</p>
        </div>
      </div>
      <div class="summary-card glass-card"
        style="text-align: left; padding: 15px; display: flex; align-items: center; gap: 15px; flex: 1;">
        <div style="font-size: 2rem; background: rgba(59, 130, 246, 0.1); padding: 10px; border-radius: 12px;">🏆</div>
        <div>
          <h4 style="margin: 0; font-size: 0.85rem; opacity: 0.7;">Top Category</h4>
          <p id="topCategory" style="margin: 5px 0 0 0; font-size: 1.2rem; font-weight: 700;">-</p>
        </div>
      </div>
    </section>

    <!-- Charts -->
    <div class="chart-grid">
      <section class="glass-card" style="padding: 20px;">
        <h3>Monthly Breakdown</h3>
        <div class="chart-wrapper" id="monthlyBreakdownChartContainer" style="position: relative;">
          <canvas id="monthlyBreakdownChart"></canvas>
        </div>
      </section>

      <section class="glass-card" style="padding: 20px;">
        <h3>Category Distribution</h3>
        <div class="chart-wrapper" id="categoryDistributionChartContainer" style="position: relative;">
          <canvas id="categoryDistributionChart"></canvas>
        </div>
      </section>
    </div>

    <!-- All Expenses Table for Selected Year -->
    <section id="allExpensesSection" class="glass-card" style="margin-top: 20px; padding: 20px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0;">All Expenses (<span id="tableYearDisplay"></span>)</h3>
        <button id="downloadYearlyBtn"
          style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.9rem; transition: background 0.2s;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span class="btn-text">Download Report</span>
        </button>
      </div>
      <div style="margin-bottom: 15px; display: flex; justify-content: flex-end;">
        <input type="text" id="expenseSearch" placeholder="Search by date (e.g. 12 Oct)..."
          style="width: 250px; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; outline: none;">
      </div>
      <div class="table-responsive" id="yearlyTableContainer" style="overflow-x: auto;">
        <table class="expense-table" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Date</th>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Amount</th>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Category</th>
              <th style="text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">Description
              </th>
            </tr>
          </thead>
          <tbody id="yearlyExpenseTableBody"></tbody>
        </table>
      </div>
      <div class="pagination-controls"
        style="text-align: center; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 15px;">
        <button id="prevPageBtn"
          style="padding: 8px 12px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: white; cursor: pointer; transition: all 0.2s;"><svg
            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg></button>
        <span id="pageInfo" style="font-weight: 600; color: rgba(255,255,255,0.8);"></span>
        <button id="nextPageBtn"
          style="padding: 8px 12px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: white; cursor: pointer; transition: all 0.2s;"><svg
            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg></button>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="js/yearly.js"></script>
</body>

</html>
