<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Dhan₹ekha</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#22c55e">
  <link rel="shortcut icon" href="assets/icons/reset.png" type="image/png">

  <link rel="stylesheet" href="css/glass.css" />
  <link rel="stylesheet" href="css/reset.css" />

</head>
<body>
  <!-- Page Loader -->
  <div id="page-loader"><div class="loader"></div><p class="loader-text"></p></div>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('page-loader');
      const text = loader.querySelector('.loader-text');
      if (text) text.innerText = "Verifying security...";
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }, 1000);
    });
  </script>

  <div class="glass-card login-container">
    <img src="assets/logo1.png" alt="Dhan₹ekha Logo" class="logo" loading="lazy" />
    <h2 id="headerTitle">Set New Password</h2>
    <p id="headerDesc" class="description">Please enter your new password below.</p>

    <form id="resetForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Enter new password" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
      </div>

      <button type="submit">Update Password</button>
    </form>
    <div id="message"></div>
    <div style="margin-top: 20px; font-size: 0.85rem; opacity: 0.7;">
      <a href="/sitemap" style="color: #22c55e; text-decoration: none;">Need help? View Sitemap</a>
    </div>
  </div>

  <script type="module">
        import { apiRequest } from './js/api.js';

        // 1. Get Token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const msgDiv = document.getElementById('message');
        const form = document.getElementById('resetForm');
        const headerTitle = document.getElementById('headerTitle');
        const headerDesc = document.getElementById('headerDesc');

        function showExpiredState() {
            form.style.display = 'none';
            headerTitle.innerText = 'Link Expired';
            headerDesc.innerHTML = 'This link is invalid or has expired.<br><br><a href="forgot-password" style="color: #22c55e; font-weight: bold; text-decoration: none; border: 1px solid #22c55e; padding: 10px 20px; border-radius: 8px; display: inline-block; margin-top: 10px;">Request New Link</a>';
            msgDiv.style.display = 'none';
        }

        if (!token) {
            showExpiredState();
        } else {
            // Check if token is expired immediately on load
            try {
                await apiRequest(`/reset-password/${token}`, 'GET', null, { skipLoader: true });
            } catch (error) {
                showExpiredState();
            }
        }

        // 2. Handle Form Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.querySelector('#resetForm button');
            const originalBtnText = submitBtn.innerText;

            if (password !== confirmPassword) {
                msgDiv.style.color = '#ef4444';
                msgDiv.innerText = 'Passwords do not match!';
                return;
            }

            // Enforce Strong Password (Min 8 chars, 1 number, 1 uppercase, 1 lowercase)
            const strongPasswordRegex = /(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{8,}/;
            if (!strongPasswordRegex.test(password)) {
                msgDiv.style.color = '#ef4444';
                msgDiv.innerText = 'Password must be 8+ chars with uppercase, lowercase, number & special char.';
                return;
            }

            // Set Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Updating...';
            msgDiv.innerText = '';

            try {
                await apiRequest(`/reset-password/${token}`, 'POST', { password }, { skipLoader: true });

                msgDiv.style.color = '#22c55e';
                msgDiv.innerText = 'Password updated! Redirecting to login...';
                setTimeout(() => { window.location.href = 'login'; }, 3000);

            } catch (error) {
                msgDiv.style.color = '#ef4444';
                msgDiv.innerText = error.message || 'Error connecting to server.';
            } finally {
                // Reset Button State
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });
  </script>
</body>
</html>
