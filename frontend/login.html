<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Dhan₹ekha</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#22c55e">
  <link rel="shortcut icon" href="assets/icons/login.png" type="image/png">
  <link rel="stylesheet" href="css/glass.css" />

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    h2 {
      margin-bottom: 30px;
      font-weight: 600;
    }
  
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: #22c55e;
      background: rgba(255,255,255,0.1);
    }
    button {
      width: 100%;
      padding: 14px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s;
    }
    button:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }
    .links {
      margin-top: 24px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .links a {
      color: #22c55e;
      text-decoration: none;
      font-weight: 600;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-right: 40px;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.2rem;
      opacity: 0.7;
      user-select: none;
    }
    /* Page Loader */
    #page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; flex-direction: column; }
    .loader { width: 45px; aspect-ratio: 1; --c:no-repeat linear-gradient(#fff 0 0); background: var(--c) 0 0, var(--c) 50% 50%, var(--c) 100% 100%; animation: l17 1s infinite alternate; margin: 0 auto; }
    .loader-text { margin-top: 15px; color: #fff; font-family: sans-serif; font-size: 1rem; letter-spacing: 0.5px; opacity: 0.8; }
    @keyframes l17 { 0%, 10% {background-size:20% 100%} 50% {background-size:20% 20%} 90%, 100% {background-size:100% 20%} }

    /* Validation Loader (New) */
    .validation-loader {
      --s: 64px;
      width: var(--s);
      aspect-ratio: 2;
      --_g: #22c55e 90%,#0000; /* Theme Green */
      background: 
        radial-gradient(farthest-side,var(--_g)) 0   50%/25% 50%,
        radial-gradient(farthest-side at bottom,var(--_g)) 50%  calc(50% - var(--s)/16)/25% 25%,
        radial-gradient(farthest-side at top   ,var(--_g)) 50%  calc(50% + var(--s)/16)/25% 25%,
        radial-gradient(farthest-side at bottom,var(--_g)) 100% calc(50% - var(--s)/16)/25% 25%,
        radial-gradient(farthest-side at top   ,var(--_g)) 100% calc(50% + var(--s)/16)/25% 25%;
      background-repeat: no-repeat;
      animation: l14 1s infinite;
    }
    @keyframes l14 {
        25%  {background-position:0    50%,50% 0,50% 100%,100% 0,100% 100%}
        50%  {background-position:100% 50%,0   0,0   100%,50%  0,50%  100%}
        75%,
        100% {background-position:100% 50%,0 calc(50% - var(--s)/16),0 calc(50% + var(--s)/16),50% calc(50% - var(--s)/16),50% calc(50% + var(--s)/16)}
    }
  </style>
  <!-- Google Sign-In Script -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Page Loader -->
  <div id="page-loader"><div class="loader"></div><p class="loader-text"></p></div>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('page-loader');
      const text = loader.querySelector('.loader-text');
      if (text) text.innerText = "Securing connection...";
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }, 1000);
    });
  </script>

  <div class="glass-card login-container">
    <img src="assets/logo1.png" alt="Dhan₹ekha Logo" class="logo" loading="lazy" />
    <h2><abbr title="Access your Dashboard">Welcome Back</abbr></h2>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required />
          <span class="toggle-password" onclick="togglePassword()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></span>
        </div>
      </div>

      <div style="text-align: right; margin-bottom: 15px;">
        <a href="forgot-password" style="color: #22c55e; text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
      </div>

      <!-- <div class="g-recaptcha" data-sitekey="6LdmsXosAAAAAMX3Iop9pTuDtHafUQpy1nXPCHr7"></div> -->
      <button type="submit">Login</button>
    </form>

    <!-- Google Login Button -->
    <div style="margin-top: 20px; display: flex; justify-content: center;">
      <div id="g_id_onload"
           data-client_id="346040397244-g4fjgl97b2kosgn8r01f2jrutlb52ns0.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="filled_black"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>

    <div style="margin-top: 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; overflow: hidden;">
      <div onclick="toggleDemo()" style="padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none;">
        <h4 style="margin: 0; font-size: 1rem;">Try Demo Account</h4>
        <span id="demoArrow" style="transition: transform 0.3s;">▼</span>
      </div>
      <div id="demoContent" style="display: none; padding: 0 15px 15px 15px; border-top: 1px solid rgba(255, 255, 255, 0.05);">
        <p style="margin: 10px 0 5px 0; font-size: 0.9rem; opacity: 0.9;">Email: <strong>demouser@mail.com</strong></p>
        <p style="margin: 5px 0; font-size: 0.9rem; opacity: 0.9;">Password: <strong>1234</strong></p>
        <button type="button" onclick="fillDemo()" style="margin-top: 10px; background: rgba(59, 130, 246, 0.8);">Login with Demo</button>
      </div>
    </div>

    <div class="links">
      <p>Don't have an account? <a href="signup">Sign Up</a></p>
      <p style="margin-top: 10px;"><a href="/">← Back to Home</a></p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.querySelector('.toggle-password');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
      } else {
        passwordInput.type = 'password';
        toggleIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      }
    }

    function fillDemo() {
      document.getElementById('email').value = 'demouser@mail.com';
      document.getElementById('password').value = '1234';
      document.getElementById('loginForm').requestSubmit();
    }

    function toggleDemo() {
      const content = document.getElementById('demoContent');
      const arrow = document.getElementById('demoArrow');
      if (content.style.display === 'none') {
        content.style.display = 'block';
        arrow.style.transform = 'rotate(180deg)';
      } else {
        content.style.display = 'none';
        arrow.style.transform = 'rotate(0deg)';
      }
    }
  </script>

  <!-- Validation Overlay -->
  <div id="validation-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px);">
    <div class="validation-loader"></div>
    <p style="color: #fff; margin-top: 30px; font-family: sans-serif; font-size: 1.1rem; letter-spacing: 0.5px;">Validating your account...</p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      if (this.checkValidity()) {
        document.getElementById('validation-overlay').style.display = 'flex';
      }
    });
  </script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
